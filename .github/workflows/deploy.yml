name: aurum · deploy

on:
  workflow_run:
    workflows: ["aurum · CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy → EC2 (dynamic IP)
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read
      packages: write

    environment:
      name: production

    steps:
      # ── 0. Checkout ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. AWS OIDC Auth ────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 2. Fetch EC2 Public IP ──────────────────────────
      - name: Fetch EC2 public IP
        id: ec2
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          if [ -z "$IP" ] || [ "$IP" = "None" ]; then
            echo "ERROR: Instance has no public IP. Is it running?"
            exit 1
          fi

          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Resolved IP: $IP"

      # ── 3. Build & Push to GHCR ─────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/aryan2vb/aurum:production
          target: production
          build-args: |
            REACT_APP_API_BASE_URL=https://api.sarafa-bazar.com

      # ── 4. Prepare SSH Key ──────────────────────────────
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      # ── 5. Wait for SSH readiness ───────────────────────
      - name: Wait for SSH
        run: |
          for i in $(seq 1 12); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=10 \
                   -i /tmp/deploy_key \
                   ${{ secrets.EC2_USER }}@${{ steps.ec2.outputs.ip }} \
                   "echo ok" 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: SSH not ready"
          exit 1

      # ── 6. Deploy (Direct SSH, no external action) ──────
      - name: Deploy via SSH
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/deploy_key \
              ${{ secrets.EC2_USER }}@${{ steps.ec2.outputs.ip }} "echo $GHCR_PAT | docker login ghcr.io -u aryan2vb --password-stdin"

          ssh -o StrictHostKeyChecking=no \
              -i /tmp/deploy_key \
              ${{ secrets.EC2_USER }}@${{ steps.ec2.outputs.ip }} << 'EOF'

            set -e
            cd /opt/aurum

            echo "── Pulling configuration code ──"
            git -C aurum pull origin main

            echo "── Setting up configuration ──"
            cp aurum/docker/docker-compose.prod.yml .
            cp -r aurum/docker/nginx .

            echo "── Cleaning up Docker to free space ──"
            docker system prune -af --volumes || true
            docker builder prune -af || true

            echo "── Pulling new images ──"
            docker compose -f docker-compose.prod.yml pull frontend

            echo "── Restarting containers ──"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "── Deploy complete ✓ ──"

          EOF

      # ── 7. Cleanup ──────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key
