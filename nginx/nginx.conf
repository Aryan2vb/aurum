# nginx/nginx.conf
# Reverse proxy: routes / → frontend:4001, /api → backend:3000
# HTTP-only for now — add SSL with certbot once a domain is configured.

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # ── Logging ─────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Gzip ────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json
             application/javascript text/xml application/xml
             application/xml+rss text/javascript;

  # ── Upstream services ───────────────────────────
  upstream frontend {
    server frontend:4001;
  }

  upstream backend {
    server backend:3000;
  }

  # ── HTTP server ─────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Backend API — strip /api prefix before forwarding
    location /api/ {
      proxy_pass         http://backend/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Backend health (for monitoring / healthcheck endpoint)
    location /health {
      proxy_pass http://backend/health;
    }

    # Frontend — everything else (SPA fallback handled by nginx inside container)
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host       $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
