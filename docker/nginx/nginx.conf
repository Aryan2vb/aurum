# /opt/aurum/nginx/nginx.conf
#
# Works TODAY:   http://YOUR_EC2_IP  (no domain, no SSL)
# Works FUTURE:  https://aurum.com + https://api.aurum.com
#
# When you buy aurum.com:
#   1. Point aurum.com     → your EC2 IP (or Elastic IP)
#   2. Point api.aurum.com → same IP
#   3. Run Certbot (see bottom of file)
#   4. Uncomment the HTTPS server blocks below
#   5. Comment out / remove the HTTP-only block
#   6. docker compose restart nginx
#
# That's the only change needed. Structure is already correct.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile           on;
  keepalive_timeout  65;
  client_max_body_size 20M;

  log_format main '$remote_addr [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer"';
  access_log /var/log/nginx/access.log main;

  gzip on;
  gzip_types text/plain text/css application/json
             application/javascript text/xml application/xml
             text/javascript image/svg+xml;
  gzip_min_length 1000;

  # ── Upstreams ─────────────────────────────────────────────
  upstream frontend_app {
    server frontend:4001;
    keepalive 16;
  }

  upstream backend_api {
    server backend:3000;
    keepalive 16;
  }

  # ══════════════════════════════════════════════════════════
  # PHASE 1 — HTTP only (RIGHT NOW, no domain needed)
  # Comment this entire block out when you add SSL in Phase 2.
  # ══════════════════════════════════════════════════════════
  server {
    listen 80 default_server;
    server_name _;               # matches any hostname or bare IP

    # Backend API — requests to /api/* → NestJS on :3000
    location /api/ {
      proxy_pass         http://backend_api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Health check (used by Docker healthcheck + monitoring)
    location = /health {
      proxy_pass http://backend_api/health;
    }

    # Frontend — everything else → React SPA on :4001
    location / {
      proxy_pass         http://frontend_app;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ══════════════════════════════════════════════════════════
  # PHASE 2 — HTTPS with aurum.com (FUTURE — uncomment when ready)
  # Run first: certbot certonly --nginx -d aurum.com -d api.aurum.com
  # ══════════════════════════════════════════════════════════

  # Redirect all HTTP → HTTPS
  # server {
  #   listen 80;
  #   server_name aurum.com www.aurum.com api.aurum.com;
  #   return 301 https://$host$request_uri;
  # }

  # Frontend: aurum.com
  # server {
  #   listen 443 ssl;
  #   server_name aurum.com www.aurum.com;
  #
  #   ssl_certificate     /etc/letsencrypt/live/aurum.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/aurum.com/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   location / {
  #     proxy_pass         http://frontend_app;
  #     proxy_http_version 1.1;
  #     proxy_set_header   Upgrade    $http_upgrade;
  #     proxy_set_header   Connection "upgrade";
  #     proxy_set_header   Host       $host;
  #     proxy_cache_bypass $http_upgrade;
  #   }
  # }

  # Backend API: api.aurum.com
  # server {
  #   listen 443 ssl;
  #   server_name api.aurum.com;
  #
  #   ssl_certificate     /etc/letsencrypt/live/aurum.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/aurum.com/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   location / {
  #     proxy_pass         http://backend_api;
